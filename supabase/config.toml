project_id = "roomie"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/confirm-email",
  "http://localhost:5173/reset-password",
  "roomie://login-callback",
  "roomie://confirm-email",
  "roomie://reset-password"
]

[storage]
enabled = true
file_size_limit = "50MiB"

[functions.agora-token]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.revenuecat-webhook]
verify_jwt = false

[functions.send-notification]
verify_jwt = true

[functions.streak-reminder-cron]
verify_jwt = false
